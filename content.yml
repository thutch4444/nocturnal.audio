about:
  label: Who We Are
  text: "Nocturnal Audio is a collective — a group of songwriters, musicians,
    recording engineers, visual artists, and event planners united by one thing:
    a passion for bringing creative projects to life. We don't just run sound.
    We collaborate, we produce, we develop artists, we build brands, and we make
    moments that people carry with them. If you've got a vision and need a crew
    to help realize it, you found your people."
