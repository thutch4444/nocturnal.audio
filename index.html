<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nocturnal Audio — Jacksonville, FL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --black: #080808; --off-black: #0f0f0f; --dark: #161616; --mid: #222;
    --warm-1: #d4823a; --warm-2: #c4622a; --warm-3: #8c3a1a;
    --white: #ede8df; --muted: #776e64; --muted-lt: #9a9088;
    --font-display: 'Bebas Neue', sans-serif; --font-body: 'DM Sans', sans-serif;
  }
  html { scroll-behavior: smooth; }
  body { background: var(--black); color: var(--white); font-family: var(--font-body); font-size: 15px; line-height: 1.6; }

  /* LOADING */
  #loading {
    position: fixed; inset: 0; background: var(--black);
    display: flex; align-items: center; justify-content: center;
    z-index: 999; flex-direction: column; gap: 16px;
  }
  #loading .l-logo { font-family: var(--font-display); font-size: 32px; letter-spacing: 3px; color: var(--white); }
  #loading .l-logo span { color: var(--warm-1); }
  #loading .l-bar { width: 120px; height: 2px; background: #1c1a18; border-radius: 2px; overflow: hidden; }
  #loading .l-fill { height: 100%; background: var(--warm-1); animation: load 1s ease forwards; }
  @keyframes load { from { width: 0; } to { width: 100%; } }

  /* HEADER */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(8,8,8,0.94); backdrop-filter: blur(10px);
    border-bottom: 1px solid #1c1a18;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 2rem; height: 64px;
  }
  .logo { font-family: var(--font-display); font-size: 28px; letter-spacing: 2px; color: var(--white); text-decoration: none; }
  .logo span { color: var(--warm-1); }
  nav { display: flex; gap: 1.75rem; align-items: center; }
  nav a { font-size: 12px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.2s; }
  nav a:hover { color: var(--white); }
  .nav-cta { color: var(--white) !important; background: var(--warm-2); padding: 8px 18px; border-radius: 2px; }
  .nav-cta:hover { background: var(--warm-3) !important; }

  /* HERO */
  .hero {
    display: flex; flex-direction: column; justify-content: flex-start;
    padding: 3rem 2rem 4rem; position: relative; overflow: hidden;
  }
  .hero-bg {
    position: absolute; inset: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 55% 55% at 75% 35%, rgba(180,70,20,0.12) 0%, transparent 65%),
      radial-gradient(ellipse 35% 45% at 15% 85%, rgba(120,40,10,0.10) 0%, transparent 60%),
      radial-gradient(ellipse 70% 30% at 50% 100%, rgba(60,15,5,0.25) 0%, transparent 70%);
  }
  .hero-eyebrow {
    font-size: 11px; font-weight: 500; letter-spacing: 3px; text-transform: uppercase;
    color: var(--warm-1); margin-bottom: 1rem; position: relative;
    display: flex; align-items: center; gap: 12px;
  }
  .hero-eyebrow::before { content: ''; display: block; width: 32px; height: 1px; background: var(--warm-1); }
  .hero-title {
    font-family: var(--font-display); font-size: clamp(64px, 12vw, 120px);
    line-height: 0.92; letter-spacing: 2px; color: var(--white); position: relative; margin-bottom: 1.75rem;
  }
  .hero-title .accent { color: var(--warm-1); }
  .hero-title .dim { color: var(--muted); }
  .hero-sub { font-size: 15px; font-weight: 300; font-style: italic; color: var(--muted-lt); max-width: 480px; position: relative; margin-bottom: 2.5rem; line-height: 1.75; }
  .hero-actions { display: flex; gap: 1rem; position: relative; }
  .btn-primary { font-size: 12px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; background: var(--warm-2); color: var(--white); border: none; padding: 14px 28px; border-radius: 2px; cursor: pointer; text-decoration: none; display: inline-block; transition: background 0.2s; }
  .btn-primary:hover { background: var(--warm-3); }
  .btn-outline { font-size: 12px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; background: transparent; color: var(--muted-lt); border: 1px solid #2a2520; padding: 14px 28px; border-radius: 2px; cursor: pointer; text-decoration: none; display: inline-block; transition: all 0.2s; }
  .btn-outline:hover { border-color: var(--muted); color: var(--white); }
  .hero-scroll { position: absolute; right: 2rem; bottom: 2rem; display: flex; flex-direction: column; align-items: center; gap: 8px; color: var(--muted); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }
  .scroll-line { width: 1px; height: 48px; background: linear-gradient(to bottom, var(--warm-1), transparent); }

  /* MISSION */
  .mission-band { background: var(--off-black); border-top: 1px solid #1c1a18; border-bottom: 1px solid #1c1a18; padding: 3.5rem 2rem; }
  .mission-inner { max-width: 720px; }
  .mission-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--warm-1); margin-bottom: 1rem; }
  .mission-text { font-size: 20px; font-weight: 300; line-height: 1.7; color: var(--white); }

  /* SERVICES */
  .services-bar { background: var(--black); border-bottom: 1px solid #1c1a18; padding: 0 2rem; }
  .services-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0; }
  .service-item { padding: 2rem 1.25rem; border-right: 1px solid #1c1a18; }
  .service-item:last-child { border-right: none; }
  .service-name { font-size: 12px; font-weight: 500; letter-spacing: 0.5px; color: var(--white); margin-bottom: 6px; }
  .service-desc { font-size: 11px; color: var(--muted); line-height: 1.5; }

  /* SECTION CHROME */
  section { padding: 5rem 2rem; }
  .section-label { font-size: 11px; font-weight: 500; letter-spacing: 3px; text-transform: uppercase; color: var(--warm-1); margin-bottom: 0.5rem; }
  .section-title { font-family: var(--font-display); font-size: 48px; letter-spacing: 1px; color: var(--white); margin-bottom: 3rem; line-height: 1; }

  /* GALLERY */
  .gallery-section { background: var(--off-black); }
  .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .gallery-item { background: var(--dark); border-radius: 2px; overflow: hidden; position: relative; aspect-ratio: 4/3; display: flex; align-items: center; justify-content: center; border: 1px solid #1c1a18; }
  .gallery-item.tall { grid-row: span 2; aspect-ratio: unset; }
  .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
  .gallery-placeholder { display: flex; flex-direction: column; align-items: center; gap: 10px; color: #2a2520; }
  .gallery-tag { position: absolute; bottom: 12px; left: 12px; background: rgba(8,8,8,0.8); border: 1px solid #2a2520; color: var(--muted); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; padding: 4px 10px; border-radius: 2px; }

  /* PLAYER */
  .player-section { background: var(--black); border-top: 1px solid #1c1a18; border-bottom: 1px solid #1c1a18; }
  .player-wrap { background: var(--off-black); border: 1px solid #1c1a18; border-radius: 4px; overflow: hidden; }
  .track-list { border-bottom: 1px solid #1c1a18; }
  .track-item { display: flex; align-items: center; gap: 16px; padding: 14px 20px; border-bottom: 1px solid #141210; cursor: pointer; transition: background 0.15s; }
  .track-item:last-child { border-bottom: none; }
  .track-item:hover { background: rgba(255,255,255,0.02); }
  .track-item.active { background: rgba(196,98,42,0.07); }
  .track-num { font-size: 11px; color: var(--muted); width: 20px; text-align: center; flex-shrink: 0; }
  .track-item.active .track-num { color: var(--warm-1); }
  .track-bars { display: flex; align-items: flex-end; gap: 2px; height: 14px; width: 20px; flex-shrink: 0; display: none; }
  .track-item.active .track-bars { display: flex; }
  .track-item.active .track-num-wrap { display: none; }
  .bar { width: 3px; background: var(--warm-1); border-radius: 1px; animation: bounce 0.6s ease-in-out infinite alternate; }
  .bar:nth-child(1) { height: 6px; animation-delay: 0s; }
  .bar:nth-child(2) { height: 12px; animation-delay: 0.15s; }
  .bar:nth-child(3) { height: 8px; animation-delay: 0.3s; }
  @keyframes bounce { to { height: 100%; } }
  .track-art { width: 40px; height: 40px; background: var(--dark); border-radius: 2px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: #333; border: 1px solid #1c1a18; }
  .track-info { flex: 1; min-width: 0; }
  .track-title { font-size: 13px; font-weight: 500; color: var(--white); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track-item.active .track-title { color: var(--warm-1); }
  .track-artist { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .track-duration { font-size: 12px; color: var(--muted); flex-shrink: 0; }
  .player-controls { display: flex; align-items: center; gap: 20px; padding: 16px 20px; background: var(--dark); }
  .ctrl-btn { background: none; border: none; color: var(--muted); cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center; transition: color 0.2s; }
  .ctrl-btn:hover { color: var(--white); }
  .ctrl-btn.play { width: 40px; height: 40px; border-radius: 50%; background: var(--warm-2); color: var(--white); flex-shrink: 0; }
  .ctrl-btn.play:hover { background: var(--warm-3); }
  .progress-wrap { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .progress-bar-bg { height: 3px; background: #222; border-radius: 2px; cursor: pointer; }
  .progress-fill { height: 100%; background: var(--warm-1); border-radius: 2px; width: 35%; }
  .progress-times { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); }
  .player-note { padding: 12px 20px; background: var(--off-black); border-top: 1px solid #1c1a18; font-size: 11px; color: var(--muted); font-style: italic; display: flex; align-items: center; gap: 8px; }
  .player-note svg { color: var(--warm-1); flex-shrink: 0; }

  /* MERCH */
  .merch-section { background: var(--off-black); border-top: 1px solid #1c1a18; }
  .merch-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
  .merch-card, .merch-card-link { border: 1px solid #1c1a18; border-radius: 2px; overflow: hidden; background: var(--dark); text-decoration: none; color: inherit; display: block; transition: border-color 0.2s; }
  .merch-card-link:hover { border-color: var(--warm-1); }
  .merch-img { aspect-ratio: 1; background: #111; display: flex; align-items: center; justify-content: center; color: #2a2520; border-bottom: 1px solid #1c1a18; overflow: hidden; }
  .merch-img img { width: 100%; height: 100%; object-fit: cover; }
  .merch-info { padding: 16px; }
  .merch-name { font-size: 13px; font-weight: 500; color: var(--white); margin-bottom: 4px; }
  .merch-price { font-size: 13px; color: var(--warm-1); font-weight: 500; }
  .merch-add { display: block; width: 100%; margin-top: 12px; padding: 10px; background: transparent; border: 1px solid #2a2520; color: var(--muted); font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; border-radius: 2px; cursor: pointer; font-family: var(--font-body); transition: all 0.2s; }
  .merch-add:hover { border-color: var(--warm-1); color: var(--warm-1); }

  /* CONTACT */
  .contact-section { background: var(--black); border-top: 1px solid #1c1a18; }
  .contact-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: start; }
  .contact-info h3 { font-family: var(--font-display); font-size: 36px; letter-spacing: 1px; color: var(--white); margin-bottom: 1rem; line-height: 1; }
  .contact-info p { font-size: 14px; color: var(--muted-lt); line-height: 1.75; margin-bottom: 2rem; }
  .contact-detail { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; font-size: 13px; color: var(--muted); }
  .contact-detail span { color: var(--white); }
  .form-field { margin-bottom: 1rem; }
  .form-field label { display: block; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .form-field input, .form-field select, .form-field textarea { width: 100%; background: var(--off-black); border: 1px solid #1c1a18; color: var(--white); font-family: var(--font-body); font-size: 14px; padding: 12px 14px; border-radius: 2px; outline: none; transition: border-color 0.2s; appearance: none; }
  .form-field input:focus, .form-field select:focus, .form-field textarea:focus { border-color: var(--warm-1); }
  .form-field select option { background: var(--dark); }
  .form-field textarea { height: 100px; resize: vertical; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .form-submit { width: 100%; padding: 14px; background: var(--warm-2); color: var(--white); border: none; font-family: var(--font-body); font-size: 12px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; border-radius: 2px; cursor: pointer; margin-top: 0.5rem; transition: background 0.2s; }
  .form-submit:hover { background: var(--warm-3); }

  /* FOOTER */
  footer { background: var(--off-black); border-top: 1px solid #1c1a18; padding: 2rem; display: flex; align-items: center; justify-content: space-between; }
  .footer-logo { font-family: var(--font-display); font-size: 20px; letter-spacing: 2px; color: var(--white); }
  .footer-logo span { color: var(--warm-1); }
  .footer-links { display: flex; gap: 1.5rem; }
  .footer-links a { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); text-decoration: none; transition: color 0.2s; }
  .footer-links a:hover { color: var(--white); }
  .footer-copy { font-size: 12px; color: #3a3530; }

  @media (max-width: 768px) {
    nav a:not(.nav-cta) { display: none; }
    .services-grid { grid-template-columns: repeat(2, 1fr); }
    .gallery-grid { grid-template-columns: 1fr 1fr; }
    .gallery-item.tall { grid-row: span 1; aspect-ratio: 4/3; }
    .merch-grid { grid-template-columns: 1fr 1fr; }
    .contact-wrap { grid-template-columns: 1fr; gap: 2.5rem; }
    .form-row { grid-template-columns: 1fr; }
    footer { flex-direction: column; gap: 1.5rem; text-align: center; }
  }
</style>
</head>
<body>

<div id="loading">
  <div class="l-logo">NOCTURNAL<span>.</span>AUDIO</div>
  <div class="l-bar"><div class="l-fill"></div></div>
</div>

<div id="app" style="display:none;">

  <!-- HEADER -->
  <header>
    <a href="#" class="logo" id="site-logo">NOCTURNAL<span>.</span>AUDIO</a>
    <nav>
      <a href="#about">About</a>
      <a href="#services">Services</a>
      <a href="#gallery">Sessions</a>
      <a href="#music">Music</a>
      <a href="#merch">Merch</a>
      <a href="#contact" class="nav-cta">Work With Us</a>
    </nav>
  </header>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-bg"></div>
    <div class="hero-eyebrow" id="hero-eyebrow"></div>
    <h1 class="hero-title" id="hero-title"></h1>
    <p class="hero-sub" id="hero-sub"></p>
    <div class="hero-actions" id="hero-actions"></div>
    <div class="hero-scroll"><div class="scroll-line"></div>Scroll</div>
  </div>

  <!-- ABOUT -->
  <div class="mission-band" id="about">
    <div class="mission-inner">
      <div class="mission-label" id="about-label"></div>
      <p class="mission-text" id="about-text"></p>
    </div>
  </div>

  <!-- SERVICES -->
  <div class="services-bar" id="services">
    <div class="services-grid" id="services-grid"></div>
  </div>

  <!-- GALLERY -->
  <section class="gallery-section" id="gallery">
    <div class="section-label" id="gallery-label"></div>
    <div class="section-title" id="gallery-title"></div>
    <div class="gallery-grid" id="gallery-grid"></div>
  </section>

  <!-- MUSIC -->
  <section class="player-section" id="music">
    <div class="section-label" id="music-label"></div>
    <div class="section-title" id="music-title"></div>
    <div class="player-wrap">
      <audio id="audio-player" preload="metadata"></audio>
      <div class="track-list" id="track-list"></div>
      <div class="player-controls">
        <button class="ctrl-btn" id="prev-btn" aria-label="Previous">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button class="ctrl-btn play" id="play-btn" aria-label="Play">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="ctrl-btn" id="next-btn" aria-label="Next">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2-8.14l4.77 3.14L8 16.14V9.86zM16 6h2v12h-2z"/></svg>
        </button>
        <div class="progress-wrap">
          <div class="progress-bar-bg" id="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
          <div class="progress-times"><span id="track-current">0:00</span><span id="track-end">0:00</span></div>
        </div>
        <button class="ctrl-btn" aria-label="Volume">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
        </button>
      </div>
      <div class="player-note">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="music-note"></span>
      </div>
    </div>
  </section>

  <!-- MERCH -->
  <section class="merch-section" id="merch">
    <div class="section-label" id="merch-label"></div>
    <div class="section-title" id="merch-title"></div>
    <div class="merch-grid" id="merch-grid"></div>
  </section>

  <!-- CONTACT -->
  <section class="contact-section" id="contact">
    <div class="contact-wrap">
      <div class="contact-info">
        <div class="section-label" id="contact-label"></div>
        <h3 id="contact-title"></h3>
        <p id="contact-body"></p>
        <div class="contact-detail">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#776e64" stroke-width="1.5"><path d="M21 16.92a2 2 0 00-1.22-1.85l-4-1.5a2 2 0 00-2.1.48l-1.2 1.2a15.8 15.8 0 01-7.03-7.03l1.2-1.2a2 2 0 00.48-2.1l-1.5-4A2 2 0 004 1H3a2 2 0 00-2 2v1c0 9.94 8.06 18 18 18h1a2 2 0 002-2v-1z"/></svg>
          <span id="contact-phone"></span>
        </div>
        <div class="contact-detail">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#776e64" stroke-width="1.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <span id="contact-email"></span>
        </div>
        <div class="contact-detail">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#776e64" stroke-width="1.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <span id="contact-city"></span>
        </div>
      </div>
      <form name="contact" method="POST" data-netlify="true" action="/" id="contact-form">
        <input type="hidden" name="form-name" value="contact">
        <div class="form-row">
          <div class="form-field"><label>Name</label><input type="text" name="name" placeholder="Your name" required></div>
          <div class="form-field"><label>Email</label><input type="email" name="email" placeholder="your@email.com" required></div>
        </div>
        <div class="form-field">
          <label>I'm interested in</label>
          <select name="service" id="contact-services"></select>
        </div>
        <div class="form-field"><label>Date / Details</label><input type="text" name="details" placeholder="Event date or project details"></div>
        <div class="form-field"><label>Message</label><textarea name="message" placeholder="Tell us about your project..."></textarea></div>
        <button type="submit" class="form-submit">Send Message</button>
      </form>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <div class="footer-logo" id="footer-logo">NOCTURNAL<span>.</span>AUDIO</div>
    <div class="footer-links" id="footer-links"></div>
    <div class="footer-copy" id="footer-copy"></div>
  </footer>

</div>

<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script>
  // Netlify Identity redirect
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user) {
        window.netlifyIdentity.on("login", () => { document.location.href = "/admin/"; });
      }
    });
  }

  const placeholderSVG = `<svg width="40" height="40" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1"><rect x="4" y="8" width="32" height="24" rx="2"/><circle cx="15" cy="18" r="4"/><path d="M4 28l8-7 6 5 5-4 13 10"/></svg>`;
  const musicNoteSVG = `<svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0a8 8 0 100 16A8 8 0 008 0zm3 8.5l-4 2.5V5l4 2.5z"/></svg>`;

  let audio;
  let tracks = [];
  let currentTrackIndex = 0;
  let isPlaying = false;

  // Inline content data to avoid fetch issues
  const contentData = jsyaml.load(`
site:
  title: Nocturnal Audio
  tagline: Jacksonville, FL — Creative Collective
  email: info@nocturnal.audio
  phone: (904) 424-2380
  city: North Florida
  instagram: https://www.instagram.com/nocturnal.audio/
  facebook: https://facebook.com
  soundcloud: https://soundcloud.com
hero:
  eyebrow: Nocturnal.Audio - A Creative Collective
  headline_line1: WE STAY
  headline_line2: UP LATE
  headline_line3: TO
  headline_line4: CREATE....
  subheading: Songwriters, musicians, engineers, artists, and event planners — working together after dark to make creative projects come to life.
  cta_primary: Work With Us
  cta_secondary: Our Story
about:
  label: Who We Are
  text: "Nocturnal Audio is a collective — a group of songwriters, musicians, recording engineers, visual artists, and event planners united by one thing: a passion for bringing creative projects to life. We don't just run sound. We collaborate, we produce, we develop artists, we build brands, and we make moments that people carry with them. If you've got a vision and need a crew to help realize it, you found your people."
services:
  - name: Event A/V
    description: Full production sound & lighting for any stage or occasion
  - name: Live Recording
    description: Studio-grade mobile rigs that capture your performance
  - name: Music Production
    description: Tracking, mixing, and mastering for artists at every level
  - name: Artist Development
    description: Brand, sound, and strategy for emerging artists
  - name: Merch Development
    description: Design, production, and fulfillment for artists & events
gallery:
  label: Events & Sessions
  title: Recent Work
  items:
    - tag: Live Event
      image: "images/gallery-feature.jpg"
      alt: Live event photo
    - tag: Studio Session
      image: "images/gallery-2.jpg"
      alt: Studio session photo
    - tag: Artwork & Merch
      image: "images/gallery-3.jpg"
      alt: Artwork & Merch photo
    - tag: Artist Development
      image: "images/gallery-4.jpg"
      alt: Artist development photo
    - tag: Recording
      image: "images/gallery-5.jpg"
      alt: Recording session photo
music:
  label: Listen
  title: Featured Tracks
  note: Audio hosted locally — add audio files in audio/ and use relative URLs.
  tracks:
    - title: Calm Down Demo
      artist: SignalNoiseRadio
      duration: 3:14
      url: "audio/Calm Down DEMO.mp3"
    - title: Silverman Radio Spoof for Film
      artist: Nocturnal Audio
      duration: 0:41
      url: "audio/Silverman Radio Spoof.mp3"
    - title: TNP PodcastBumper Music
      artist: Nocturnal Audio
      duration: 0:36
      url: "audio/TNP Bumper Music.mp3"
merch:
  label: Merch
  title: Get Nocturnal
  items:
    - name: Nocturnal Tee — Black
      price: $28
      image: "images/merch-tee.jpg"
      alt: Nocturnal Audio black tee
    - name: 5-Panel Hat
      price: $34
      image: "images/merch-hat.jpg"
      alt: Nocturnal Audio 5-panel hat
      url: "https://nocturnal-audio-shop.myshopify.com/products/5-panel-hat"
    - name: Utility Bag
      price: $30
      image: "images/merch-utility-bag.jpg"
      alt: Utility Bag
contact:
  label: Get in Touch
  title: Ready to make something?
  body: Whether you're an artist looking to grow, a band ready to record, or a brand planning an event — the Nocturnal Audio collective is here. Based in Jacksonville, FL and available across the region.
  services:
    - Event A/V
    - Live Recording
    - Music Production
    - Artist Development
    - Merch Development
`);

  // Initialize the site with inline content
  try {
    buildSite(contentData);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  } catch (err) {
    console.error('Could not load content', err);
    document.getElementById('loading').innerHTML = '<div style="color:#776e64;font-family:sans-serif;font-size:14px;">Could not load content. Check content.yml exists and is reachable from the site root.</div>';
  }

  function buildSite(d) {
    // HERO
    document.getElementById('hero-eyebrow').textContent = d.hero.eyebrow;
    document.getElementById('hero-title').innerHTML =
      `${d.hero.headline_line1}<br>
       <span class="accent">${d.hero.headline_line2}</span><br>
       <span class="dim">${d.hero.headline_line3}</span><br>
       ${d.hero.headline_line4}<span class="accent">.</span>`;
    document.getElementById('hero-sub').textContent = d.hero.subheading;
    document.getElementById('hero-actions').innerHTML =
      `<a href="#contact" class="btn-primary">${d.hero.cta_primary}</a>
       <a href="#about" class="btn-outline">${d.hero.cta_secondary}</a>`;

    // ABOUT
    document.getElementById('about-label').textContent = d.about.label;
    document.getElementById('about-text').textContent = d.about.text;

    // SERVICES
    const serviceIcons = [
      `<svg style="width:28px;height:28px;margin-bottom:12px;color:var(--warm-1)" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="16" cy="16" r="10"/><circle cx="16" cy="16" r="4"/><line x1="16" y1="6" x2="16" y2="2"/><line x1="26" y1="16" x2="30" y2="16"/></svg>`,
      `<svg style="width:28px;height:28px;margin-bottom:12px;color:var(--warm-1)" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="4" y="10" width="8" height="12" rx="4"/><line x1="8" y1="22" x2="8" y2="28"/><line x1="4" y1="28" x2="12" y2="28"/><path d="M16 8c4.4 0 8 3.6 8 8s-3.6 8-8 8"/><path d="M16 4c6.6 0 12 5.4 12 12s-5.4 12-12 12"/></svg>`,
      `<svg style="width:28px;height:28px;margin-bottom:12px;color:var(--warm-1)" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="8" width="28" height="16" rx="2"/><circle cx="9" cy="16" r="3"/><line x1="16" y1="12" x2="26" y2="12"/><line x1="16" y1="16" x2="24" y2="16"/><line x1="16" y1="20" x2="22" y2="20"/></svg>`,
      `<svg style="width:28px;height:28px;margin-bottom:12px;color:var(--warm-1)" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="16" cy="10" r="5"/><path d="M6 28c0-5.5 4.5-10 10-10s10 4.5 10 10"/><path d="M22 14l4 2M24 18l3 1"/></svg>`,
      `<svg style="width:28px;height:28px;margin-bottom:12px;color:var(--warm-1)" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="6" y="4" width="20" height="24" rx="2"/><path d="M10 10h12M10 15h12M10 20h8"/><circle cx="22" cy="22" r="5"/><path d="M20 22l1.5 1.5L24 20"/></svg>`
    ];
    document.getElementById('services-grid').innerHTML = d.services.map((s, i) => `
      <div class="service-item">
        ${serviceIcons[i] || ''}
        <div class="service-name">${s.name}</div>
        <div class="service-desc">${s.description}</div>
      </div>`).join('');

    // GALLERY
    document.getElementById('gallery-label').textContent = d.gallery.label;
    document.getElementById('gallery-title').textContent = d.gallery.title;
    document.getElementById('gallery-grid').innerHTML = d.gallery.items.map((item, i) => `
      <div class="gallery-item${i === 0 ? ' tall' : ''}">
        ${item.image
          ? `<img src="${item.image}" alt="${item.alt}">`
          : `<div class="gallery-placeholder">${placeholderSVG}</div>`}
        <div class="gallery-tag">${item.tag}</div>
      </div>`).join('');

    // MUSIC
    document.getElementById('music-label').textContent = d.music.label;
    document.getElementById('music-title').textContent = d.music.title;
    document.getElementById('music-note').textContent = d.music.note;
    tracks = d.music.tracks || [];
    renderTrackList();
    if (tracks[0]) {
      document.getElementById('track-end').textContent = tracks[0].duration;
      document.getElementById('track-current').textContent = '0:00';
    }

    // MERCH
    document.getElementById('merch-label').textContent = d.merch.label;
    document.getElementById('merch-title').textContent = d.merch.title;
    document.getElementById('merch-grid').innerHTML = d.merch.items.map(item => `
      ${item.url ? `<a href="${item.url}" target="_blank" rel="noopener" class="merch-card-link">` : '<div class="merch-card">'}
        <div class="merch-img">
          ${item.image
            ? `<img src="${item.image}" alt="${item.alt}">`
            : `<svg width="56" height="56" viewBox="0 0 56 56" fill="none" stroke="#2a2520" stroke-width="1"><rect x="8" y="8" width="40" height="40" rx="4"/><path d="M8 20h40M20 8v40"/></svg>`}
        </div>
        <div class="merch-info">
          <div class="merch-name">${item.name}</div>
          <div class="merch-price">${item.price}</div>
          <button class="merch-add">${item.url ? 'View Product' : 'Add to Cart'}</button>
        </div>
      ${item.url ? '</a>' : '</div>'}`).join('');

    // CONTACT
    document.getElementById('contact-label').textContent = d.contact.label;
    document.getElementById('contact-title').textContent = d.contact.title;
    document.getElementById('contact-body').textContent = d.contact.body;
    document.getElementById('contact-phone').textContent = d.site.phone;
    document.getElementById('contact-email').textContent = d.site.email;
    document.getElementById('contact-city').textContent = d.site.city;
    document.getElementById('contact-services').innerHTML = d.contact.services.map(s => `<option>${s}</option>`).join('');

    // FOOTER
    document.getElementById('footer-links').innerHTML = `
      <a href="${d.site.instagram}" target="_blank" rel="noopener">Instagram</a>
      <a href="${d.site.facebook}" target="_blank" rel="noopener">Facebook</a>
      <a href="${d.site.soundcloud}" target="_blank" rel="noopener">SoundCloud</a>`;
    document.getElementById('footer-copy').textContent = `© ${new Date().getFullYear()} ${d.site.title} LLC`;

    initPlayer();
  }

  function renderTrackList() {
    const trackList = document.getElementById('track-list');
    trackList.innerHTML = tracks.map((t, i) => `
      <div class="track-item${i === currentTrackIndex ? ' active' : ''}" data-index="${i}">
        <div class="track-bars"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
        <div class="track-num-wrap"><span class="track-num">${i + 1}</span></div>
        <div class="track-art">${musicNoteSVG}</div>
        <div class="track-info">
          <div class="track-title">${t.title}</div>
          <div class="track-artist">${t.artist}</div>
        </div>
        <div class="track-duration">${t.duration}</div>
      </div>`).join('');
  }

  function initPlayer() {
    audio = document.getElementById('audio-player');
    const playBtn = document.getElementById('play-btn');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const progressBar = document.getElementById('progress-bar');

    if (!audio || tracks.length === 0) return;

    updateTrackNote();
    loadTrack(currentTrackIndex);

    document.getElementById('track-list').addEventListener('click', e => {
      const item = e.target.closest('.track-item');
      if (!item) return;
      const index = Number(item.dataset.index);
      if (!Number.isNaN(index)) selectTrack(index);
    });

    playBtn.addEventListener('click', () => {
      if (!tracks[currentTrackIndex] || !tracks[currentTrackIndex].url) return;
      isPlaying ? pauseTrack() : playTrack();
    });

    prevBtn.addEventListener('click', () => {
      if (tracks.length === 0) return;
      selectTrack((currentTrackIndex - 1 + tracks.length) % tracks.length);
    });

    nextBtn.addEventListener('click', () => {
      if (tracks.length === 0) return;
      selectTrack((currentTrackIndex + 1) % tracks.length);
    });

    progressBar.addEventListener('click', e => {
      if (!audio.duration || !audio.src) return;
      const rect = progressBar.getBoundingClientRect();
      const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      audio.currentTime = pct * audio.duration;
    });

    audio.addEventListener('timeupdate', updateProgress);
    audio.addEventListener('loadedmetadata', updateProgress);
    audio.addEventListener('ended', () => {
      isPlaying = false;
      updatePlayButton();
      selectTrack((currentTrackIndex + 1) % tracks.length);
    });
  }

  function loadTrack(index) {
    const track = tracks[index];
    if (!track) return;
    currentTrackIndex = index;
    const trackEnd = document.getElementById('track-end');
    const trackCurrent = document.getElementById('track-current');
    document.querySelectorAll('.track-item').forEach((t, i) => {
      t.classList.toggle('active', i === currentTrackIndex);
    });
    trackEnd.textContent = track.duration || '0:00';
    trackCurrent.textContent = '0:00';
    if (track.url) {
      audio.src = track.url;
      audio.load();
      isPlaying = false;
      updatePlayButton();
      updateTrackNote();
    } else {
      audio.removeAttribute('src');
      audio.pause();
      isPlaying = false;
      updatePlayButton();
      updateTrackNote('Audio not available yet. Connect a Dropbox or SoundCloud URL in content.yml.');
    }
    document.getElementById('progress-fill').style.width = '0%';
    renderTrackList();
  }

  function selectTrack(index) {
    if (index < 0 || index >= tracks.length) return;
    currentTrackIndex = index;
    loadTrack(index);
  }

  function playTrack() {
    if (!audio.src) return;
    audio.play().then(() => {
      isPlaying = true;
      updatePlayButton();
    }).catch(() => {
      isPlaying = false;
      updatePlayButton();
    });
  }

  function pauseTrack() {
    audio.pause();
    isPlaying = false;
    updatePlayButton();
  }

  function updatePlayButton() {
    const playBtn = document.getElementById('play-btn');
    const icon = playBtn.querySelector('svg path');
    if (isPlaying) {
      icon.setAttribute('d', 'M6 6h4v12H6zm8 0h4v12h-4z');
      playBtn.setAttribute('aria-label', 'Pause');
    } else {
      icon.setAttribute('d', 'M8 5v14l11-7z');
      playBtn.setAttribute('aria-label', 'Play');
    }
  }

  function updateProgress() {
    if (!audio.duration) return;
    const percent = (audio.currentTime / audio.duration) * 100;
    document.getElementById('progress-fill').style.width = `${percent}%`;
    document.getElementById('track-current').textContent = formatTime(audio.currentTime);
  }

  function formatTime(seconds) {
    const mins = Math.floor(seconds / 60);
    const secs = Math.floor(seconds % 60).toString().padStart(2, '0');
    return `${mins}:${secs}`;
  }

  function updateTrackNote(message) {
    const note = document.getElementById('music-note');
    if (message) {
      note.textContent = message;
      return;
    }
    const track = tracks[currentTrackIndex];
    if (track && track.url) {
      note.textContent = `Now playing: ${track.title} — ${track.artist}`;
    } else {
      note.textContent = `Audio hosted externally — tracks will link to Dropbox or SoundCloud when connected.`;
    }
  }

  // Contact form handling for Netlify forms
  function initContactForm() {
    const form = document.getElementById('contact-form');
    if (!form) return;

    // Listen for Netlify form events
    form.addEventListener('submit', function(e) {
      const submitBtn = form.querySelector('.form-submit');
      const originalText = submitBtn.textContent;
      
      // Show loading state
      submitBtn.textContent = 'Sending...';
      submitBtn.disabled = true;
    });

    // Handle successful submission
    document.addEventListener('nfFormSubmitSuccess', function(event) {
      const form = document.getElementById('contact-form');
      const submitBtn = form.querySelector('.form-submit');
      const originalText = 'Send Message';
      
      submitBtn.textContent = 'Message Sent!';
      submitBtn.style.background = 'var(--warm-1)';
      form.reset();
      
      // Reset button after 3 seconds
      setTimeout(() => {
        submitBtn.textContent = originalText;
        submitBtn.style.background = '';
        submitBtn.disabled = false;
      }, 3000);
    });

    // Handle submission error
    document.addEventListener('nfFormSubmitError', function(event) {
      const form = document.getElementById('contact-form');
      const submitBtn = form.querySelector('.form-submit');
      const originalText = 'Send Message';
      
      submitBtn.textContent = 'Error - Try Again';
      submitBtn.style.background = '#f44336';
      
      // Reset button after 3 seconds
      setTimeout(() => {
        submitBtn.textContent = originalText;
        submitBtn.style.background = '';
        submitBtn.disabled = false;
      }, 3000);
    });
  }

  // Initialize everything
  document.addEventListener('DOMContentLoaded', function() {
    initContactForm();
  });
</script>
