backend:
  name: git-gateway
  branch: main

media_folder: images
public_folder: /images

collections:
  - name: pages
    label: Pages
    files:
      - name: home
        label: Home Page
        file: index.html
        fields:
          - { label: "Hero Eyebrow", name: "hero_eyebrow", widget: "string" }
          - { label: "Mission Text", name: "mission_text", widget: "text" }